<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account - Task Management</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }

        h1 {
            color: #2a6fdb;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Delete Your Task Management Account</h1>
    <p>We're sorry to see you go. Please submit this form to request permanent deletion of your account.</p>

    <form>
        <input type="text" placeholder="Enter your full name" required>
        <input type="email" placeholder="Enter your registered email" required>
        <input type="tel" placeholder="Registered phone number" required>
        <textarea placeholder="Reason for leaving (optional)"></textarea>

        <button type="submit">Delete My Account</button>
    </form>
</div>

</body>
</html>
